name: tv_app
description: A modern Android TV app with IPTV channels
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0

  # Video player
  wakelock_plus: ^1.2.0

  # Local database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # State management
  provider: ^6.1.1

  # UI
  cached_network_image: ^3.3.0
  flutter_spinkit: ^5.2.0
  youtube_player_flutter: ^9.1.3
  better_player_plus: ^1.1.5
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  flutter_foreground_task: ^9.2.0
  fluttertoast: ^9.0.0
  simple_tv_navigation: ^0.0.1+34
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
